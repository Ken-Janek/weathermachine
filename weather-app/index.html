<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <style>
        :root {
            --sky-top: #0e4c92;
            --sky-mid: #2f80c8;
            --sky-bottom: #9fd3ff;
            --panel: rgba(255, 255, 255, 0.84);
            --panel-border: rgba(255, 255, 255, 0.55);
            --text-main: #0f2438;
            --text-sub: #35516d;
            --accent: #0d6bcf;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text-main);
            background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 42%, var(--sky-bottom) 100%);
            padding: 2rem 1rem 3rem;
        }

        .app {
            width: 100%;
            max-width: 860px;
            margin: 0 auto;
        }

        .hero {
            padding: 1.5rem;
            border-radius: 20px;
            background: linear-gradient(140deg, rgba(255, 255, 255, 0.22), rgba(255, 255, 255, 0.1));
            -webkit-backdrop-filter: blur(8px);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.32);
            color: #f4f9ff;
            box-shadow: 0 18px 40px rgba(8, 30, 65, 0.24);
            margin-bottom: 1rem;
        }

        .hero h1 {
            margin: 0;
            font-size: 1.9rem;
            letter-spacing: 0.02em;
        }

        .hero p {
            margin: 0.45rem 0 0;
            opacity: 0.92;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 0.9rem;
        }

        .map-wrap {
            margin-bottom: 0.9rem;
            border-radius: 18px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.86);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 26px rgba(17, 45, 77, 0.2);
        }

        #location-map {
            width: 100%;
            height: 250px;
        }

        .weather-card {
            border-radius: 18px;
            background: var(--panel);
            border: 1px solid var(--panel-border);
            box-shadow: 0 10px 26px rgba(17, 45, 77, 0.2);
            padding: 1rem;
            min-height: 170px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .weather-card.your-location {
            grid-column: 1 / -1;
            background: linear-gradient(140deg, rgba(255, 255, 255, 0.92), rgba(219, 239, 255, 0.9));
            border: 1px solid rgba(13, 107, 207, 0.28);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.6rem;
        }

        .city {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .temp {
            margin: 0.35rem 0 0;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1;
        }

        .condition {
            margin: 0.2rem 0 0;
            color: var(--text-sub);
            font-weight: 600;
        }

        .meta {
            display: flex;
            gap: 0.75rem;
            margin-top: 0.9rem;
            font-size: 0.88rem;
            color: var(--text-sub);
            flex-wrap: wrap;
        }

        .meta span {
            background: rgba(255, 255, 255, 0.6);
            padding: 0.32rem 0.5rem;
            border-radius: 10px;
        }

        .loading,
        .error {
            color: var(--text-sub);
            margin: 0;
        }

        .weather-icon {
            width: 56px;
            height: 56px;
        }

        @media (max-width: 560px) {
            .hero h1 { font-size: 1.6rem; }
            .temp { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <main class="app">
        <section class="hero">
            <h1>Weather App</h1>
            <p>Current weather overview</p>
        </section>
        <section class="map-wrap">
            <div id="location-map"></div>
        </section>
        <section class="container" id="weather-container"></section>
    </main>
    <script>
        const API_KEY = '542fcb5a99721dd037420fd7893c8567';
        const cities = ['Tallinn', 'Tartu', 'Pärnu', 'Narva', 'Viljandi'];
        const container = document.getElementById('weather-container');
        const map = L.map('location-map', { zoomControl: true }).setView([58.7, 25.4], 7);
        const locationMapMarker = L.marker([58.7, 25.4]).addTo(map).bindPopup('Default map center: Estonia');

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(map);

        function renderWeatherCard(card, data, label) {
            const iconCode = data.weather[0].icon;
            const iconUrl = 'https://openweathermap.org/img/wn/' + iconCode + '@2x.png';
            const cityName = label || data.name;

            card.innerHTML =
                '<div class="card-top">' +
                '<h2 class="city">' + cityName + '</h2>' +
                '<img class="weather-icon" src="' + iconUrl + '" alt="' + data.weather[0].description + '">' +
                '</div>' +
                '<p class="temp">' + Math.round(data.main.temp) + '°C</p>' +
                '<p class="condition">' + data.weather[0].description + '</p>' +
                '<div class="meta">' +
                '<span>Feels like ' + Math.round(data.main.feels_like) + '°C</span>' +
                '<span>Humidity ' + data.main.humidity + '%</span>' +
                '<span>Wind ' + data.wind.speed + ' m/s</span>' +
                '</div>';
        }

        // Geolocation card at top
        const geoCard = document.createElement('div');
        geoCard.className = 'weather-card your-location';
        geoCard.innerHTML = '<p class="loading">Detecting your location...</p>';
        container.appendChild(geoCard);

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(function(pos) {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                map.setView([lat, lon], 11);
                locationMapMarker.setLatLng([lat, lon]).bindPopup('Your current location').openPopup();

                fetch('https://api.openweathermap.org/data/2.5/weather?lat=' + lat + '&lon=' + lon + '&appid=' + API_KEY + '&units=metric')
                    .then(r => r.json())
                    .then(data => {
                        if (data.weather && data.weather.length > 0) {
                            renderWeatherCard(geoCard, data, '📍 ' + data.name);
                        } else {
                            geoCard.innerHTML = '<p class="error">Weather data unavailable.</p>';
                        }
                    })
                    .catch(() => { geoCard.innerHTML = '<p class="error">Failed to load your location weather.</p>'; });
            }, function() {
                geoCard.innerHTML = '<p class="error">Location access denied.</p>';
                locationMapMarker.bindPopup('Location access denied.').openPopup();
            });
        } else {
            geoCard.innerHTML = '<p class="error">Geolocation not supported.</p>';
            locationMapMarker.bindPopup('Geolocation not supported.').openPopup();
        }

        cities.forEach(city => {
            const card = document.createElement('div');
            card.className = 'weather-card';
            card.innerHTML = '<p class="loading">Loading ' + city + '...</p>';
            container.appendChild(card);

            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`)
                .then(response => response.json())
                .then(data => {
                    if (data.weather && data.weather.length > 0) {
                        renderWeatherCard(card, data, city);
                    } else {
                        card.innerHTML = '<p class="error">Weather data unavailable.</p>';
                    }
                })
                .catch(() => {
                    card.innerHTML = '<p class="error">Failed to load ' + city + '.</p>';
                });
        });
    </script>
</body>
</html>
