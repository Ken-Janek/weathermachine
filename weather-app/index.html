<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; }
        #weather { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .loading { color: #888; }
    </style>
</head>
<body>
    <div style="margin-bottom: 1rem;">
        <label for="city-select">Choose a city: </label>
        <select id="city-select">
            <option value="Tallinn">Tallinn</option>
            <option value="Tartu">Tartu</option>
            <option value="Pärnu">Pärnu</option>
            <option value="Narva">Narva</option>
            <option value="Viljandi">Viljandi</option>
        </select>
    </div>
    <div id="weather">
        <div class="loading">Loading weather...</div>
    </div>
    <script>
        // Replace 'YOUR_API_KEY' with your OpenWeatherMap API key
        const API_KEY = '542fcb5a99721dd037420fd7893c8567';
        const weatherDiv = document.getElementById('weather');
        const citySelect = document.getElementById('city-select');

        function fetchWeather(city) {
            weatherDiv.innerHTML = '<div class="loading">Loading weather...</div>';
            fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&appid=${API_KEY}&units=metric`)
                .then(response => response.json())
                .then(data => {
                    if (data.weather && data.weather.length > 0) {
                        weatherDiv.innerHTML = `
                            <h2>${city}</h2>
                            <div style="font-size:2rem;">${data.weather[0].main}</div>
                            <div>${data.main.temp}°C</div>
                        `;
                    } else {
                        weatherDiv.innerHTML = '<div>Weather data unavailable.</div>';
                    }
                })
                .catch(() => {
                    weatherDiv.innerHTML = '<div>Failed to load weather.</div>';
                });
        }

        citySelect.addEventListener('change', function() {
            fetchWeather(this.value);
        });

        // Initial load
        fetchWeather(citySelect.value);
    </script>
</body>
</html>
