<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #weather { background: #fff; padding: 2rem; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center; }
        .loading { color: #888; }
    </style>
</head>
<body>
    <div id="weather">
        <div class="loading">Loading weather...</div>
    </div>
    <script>
        // Replace 'YOUR_API_KEY' with your OpenWeatherMap API key
        const API_KEY = 'YOUR_API_KEY';
        const CITY = 'London'; // You can change the city
        const weatherDiv = document.getElementById('weather');

        fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CITY}&appid=${API_KEY}&units=metric`)
            .then(response => response.json())
            .then(data => {
                if (data.weather && data.weather.length > 0) {
                    weatherDiv.innerHTML = `
                        <h2>${CITY}</h2>
                        <div style="font-size:2rem;">${data.weather[0].main}</div>
                        <div>${data.main.temp}°C</div>
                    `;
                } else {
                    weatherDiv.innerHTML = '<div>Weather data unavailable.</div>';
                }
            })
            .catch(() => {
                weatherDiv.innerHTML = '<div>Failed to load weather.</div>';
            });
    </script>
</body>
</html>
